<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家族图谱 — 家族谱</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ── Tree container ── */
    #tree-container {
      width: 100%;
      height: calc(100vh - var(--nav-height) - 160px);
      min-height: 500px;
      background: var(--white);
      border: 1px solid var(--parchment-3);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
    }
    #tree-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #tree-svg:active { cursor: grabbing; }

    /* ── Tree nodes ── */
    .node-group { cursor: pointer; }
    .node-card {
      fill: white;
      stroke: #e8dfd0;
      stroke-width: 1.5;
      rx: 10;
      filter: drop-shadow(0 2px 6px rgba(26,18,8,0.08));
      transition: all 0.2s;
    }
    .node-card:hover { stroke: #b8860b; stroke-width: 2; }
    .node-card.male   { fill: #f0f4ff; stroke: #c0cef0; }
    .node-card.female { fill: #fff0f4; stroke: #f0c0ce; }
    .node-name  { font-family: 'Noto Serif SC', serif; font-size: 13px; fill: #1a1208; font-weight: 500; }
    .node-meta  { font-size: 11px; fill: #7a6a58; }
    .node-avatar-bg { fill: #f2ebe0; }
    .link { fill: none; stroke: #e8dfd0; stroke-width: 1.5; }

    /* ── Empty state ── */
    .tree-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      gap: 12px;
    }
    .tree-empty-icon { font-size: 3rem; margin-bottom: 8px; }
    .tree-empty h3   { font-size: 1.1rem; color: var(--ink); }
    .tree-empty p    { font-size: 0.87rem; color: var(--ink-muted); max-width: 300px; }

    /* ── Toolbar ── */
    .tree-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tree-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ctrl-btn {
      width: 34px; height: 34px;
      border-radius: var(--radius);
      border: 1px solid var(--parchment-3);
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--ink-muted);
      transition: var(--transition);
    }
    .ctrl-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--parchment); }

    /* ── Member detail panel ── */
    .detail-panel {
      position: fixed;
      right: -360px;
      top: var(--nav-height);
      width: 340px;
      height: calc(100vh - var(--nav-height));
      background: var(--white);
      border-left: 1px solid var(--parchment-3);
      box-shadow: -4px 0 24px rgba(26,18,8,0.08);
      transition: right 0.3s ease;
      z-index: 50;
      overflow-y: auto;
      padding: 28px 24px;
    }
    .detail-panel.open { right: 0; }
    .detail-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--ink-muted);
      font-size: 1rem;
      transition: var(--transition);
    }
    .detail-close:hover { background: var(--parchment-2); }
    .detail-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--parchment-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 14px;
      border: 3px solid var(--parchment-3);
      overflow: hidden;
    }
    .detail-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .detail-name { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: 4px; }
    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--parchment-3);
      font-size: 0.87rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { color: var(--ink-muted); min-width: 60px; flex-shrink: 0; }
    .detail-row-value { color: var(--ink-light); }
    .detail-relations { margin-top: 16px; }
    .relation-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--parchment-2);
      border-radius: 99px;
      font-size: 0.78rem;
      color: var(--ink-light);
      margin: 3px;
      cursor: pointer;
      transition: var(--transition);
    }
    .relation-chip:hover { background: var(--parchment-3); color: var(--ink); }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="brand-icon">🌳</div>
    家族谱
  </a>
  <div class="navbar-links">
    <span id="nav-guest"><a href="login.html" class="btn-login">登入</a></span>
    <span id="nav-user" class="navbar-user hidden">
      <a href="dashboard.html" class="active">家族图谱</a>
      <a href="photos.html">照片</a>
      <a href="admin.html" id="nav-admin-link" style="display:none;">管理员</a>
      <a href="profile.html">
        <img src="" alt="头像" class="navbar-avatar" id="nav-avatar" onerror="this.style.display='none'" />
      </a>
      <button class="btn btn-outline btn-sm" onclick="logout()">登出</button>
    </span>
  </div>
</nav>

<div class="app-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <span class="sidebar-label">导航</span>
    <div class="sidebar-section">
      <a href="dashboard.html" class="sidebar-link active">
        <span class="icon">🗺️</span> 家族图谱
      </a>
      <a href="photos.html" class="sidebar-link">
        <span class="icon">📸</span> 照片与上传
      </a>
      <a href="profile.html" class="sidebar-link">
        <span class="icon">👤</span> 个人设置
      </a>
    </div>
    <span class="sidebar-label" id="sidebar-admin-label" style="display:none;">管理员</span>
    <div class="sidebar-section" id="sidebar-admin-section" style="display:none;">
      <a href="admin.html" class="sidebar-link">
        <span class="icon">⚙️</span> 管理面板
      </a>
    </div>
    <span class="sidebar-label" style="margin-top:auto;">账号</span>
    <div class="sidebar-section">
      <a class="sidebar-link" onclick="logout()" style="cursor:pointer;">
        <span class="icon">🚪</span> 登出
      </a>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1>家族图谱</h1>
        <p>点击成员节点查看详情 · 拖拽移动 · 滚轮缩放</p>
      </div>
      <div id="admin-add-btn" style="display:none;">
        <button class="btn btn-primary" onclick="window.location.href='admin.html'">
          ＋ 添加成员
        </button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="tree-toolbar">
      <div class="tree-controls">
        <button class="ctrl-btn" onclick="zoomIn()"  title="放大">＋</button>
        <button class="ctrl-btn" onclick="zoomOut()" title="缩小">－</button>
        <button class="ctrl-btn" onclick="resetZoom()" title="重置视图">⊙</button>
      </div>
      <div style="font-size:0.82rem; color:var(--ink-muted);" id="member-count"></div>
    </div>

    <!-- Tree -->
    <div id="tree-container">
      <svg id="tree-svg"></svg>
      <div class="tree-empty hidden" id="tree-empty">
        <div class="tree-empty-icon">🌱</div>
        <h3>家族树暂无成员</h3>
        <p>请管理员前往管理面板添加家族成员并设置关系</p>
        <a href="admin.html" class="btn btn-primary btn-sm" id="empty-admin-btn" style="display:none;margin-top:8px;">
          前往管理面板
        </a>
      </div>
    </div>
  </main>
</div>

<!-- ── MEMBER DETAIL PANEL ── -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-close" onclick="closeDetail()">✕</div>
  <div class="detail-avatar" id="detail-avatar">👤</div>
  <div class="detail-name"   id="detail-name">—</div>
  <div class="mb-16">
    <span class="badge badge-ink" id="detail-gender"></span>
  </div>
  <div id="detail-fields"></div>
  <div class="detail-relations" id="detail-relations"></div>
</div>

<!-- D3.js -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
  const NODE_W = 140, NODE_H = 64, H_GAP = 60, V_GAP = 100;

  let allMembers = [], allRelationships = [];
  let svgEl, gEl, zoomBehavior;
  let currentZoom = 1;

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    await requireAuth();
    await initNavbar();

    const admin = await isAdmin();
    if (admin) {
      document.getElementById('admin-add-btn').style.display = 'block';
      document.getElementById('sidebar-admin-label').style.display = 'block';
      document.getElementById('sidebar-admin-section').style.display = 'block';
      document.getElementById('empty-admin-btn').style.display = 'inline-flex';
    }

    await loadTree();
  }

  // ── Load data ────────────────────────────────────────────────
  async function loadTree() {
    const [{ data: members }, { data: rels }] = await Promise.all([
      _supabase.from('family_members').select('*').order('date_of_birth'),
      _supabase.from('relationships').select('*'),
    ]);

    allMembers       = members || [];
    allRelationships = rels    || [];

    const count = allMembers.length;
    document.getElementById('member-count').textContent =
      count ? `共 ${count} 位成员` : '';

    if (count === 0) {
      document.getElementById('tree-empty').classList.remove('hidden');
      return;
    }

    renderTree();
  }

  // ── Build tree layout ────────────────────────────────────────
  function buildHierarchy() {
    // Find parent-child relationships
    const parentOf = {}; // childId -> parentId
    allRelationships.forEach(r => {
      if (r.relationship_type === 'parent_child') {
        parentOf[r.member_b_id] = r.member_a_id;
      }
    });

    // Find root nodes (no parent)
    const roots = allMembers.filter(m => !parentOf[m.id]);

    // Build tree structure
    function buildNode(member) {
      const children = allMembers
        .filter(m => parentOf[m.id] === member.id)
        .map(buildNode);
      return { ...member, children };
    }

    if (roots.length === 0) return null;

    // If multiple roots, create a virtual root
    if (roots.length === 1) {
      return buildNode(roots[0]);
    }

    return {
      id: '__root__',
      name: '家族',
      children: roots.map(buildNode),
      virtual: true,
    };
  }

  // ── Render with D3 ──────────────────────────────────────────
  function renderTree() {
    const container = document.getElementById('tree-container');
    const W = container.clientWidth;
    const H = container.clientHeight;

    svgEl = d3.select('#tree-svg');
    svgEl.selectAll('*').remove();

    gEl = svgEl.append('g');

    // Zoom
    zoomBehavior = d3.zoom()
      .scaleExtent([0.2, 3])
      .on('zoom', e => {
        gEl.attr('transform', e.transform);
        currentZoom = e.transform.k;
      });
    svgEl.call(zoomBehavior);

    const hierarchy = buildHierarchy();
    if (!hierarchy) return;

    const root = d3.hierarchy(hierarchy);
    const treeLayout = d3.tree()
      .nodeSize([NODE_W + H_GAP, NODE_H + V_GAP]);

    treeLayout(root);

    // Draw spouse links (horizontal lines between spouses)
    const spousePairs = allRelationships
      .filter(r => r.relationship_type === 'spouse')
      .map(r => ({
        a: allMembers.find(m => m.id === r.member_a_id),
        b: allMembers.find(m => m.id === r.member_b_id),
      }))
      .filter(p => p.a && p.b);

    // Draw parent-child links
    gEl.selectAll('.link')
      .data(root.links().filter(l => !l.source.data.virtual))
      .join('path')
      .attr('class', 'link')
      .attr('d', d => {
        const sx = d.source.x, sy = d.source.y + NODE_H / 2;
        const tx = d.target.x, ty = d.target.y - NODE_H / 2;
        const my = (sy + ty) / 2;
        return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
      });

    // Draw nodes
    const nodeGroups = gEl.selectAll('.node-group')
      .data(root.descendants().filter(d => !d.data.virtual))
      .join('g')
      .attr('class', 'node-group')
      .attr('transform', d => `translate(${d.x - NODE_W/2},${d.y - NODE_H/2})`)
      .on('click', (e, d) => showDetail(d.data));

    // Node background card
    nodeGroups.append('rect')
      .attr('class', d => `node-card ${d.data.gender === 'female' ? 'female' : 'male'}`)
      .attr('width', NODE_W)
      .attr('height', NODE_H)
      .attr('rx', 10);

    // Avatar circle
    nodeGroups.append('circle')
      .attr('class', 'node-avatar-bg')
      .attr('cx', 26)
      .attr('cy', NODE_H / 2)
      .attr('r', 18);

    // Avatar emoji or initial
    nodeGroups.append('text')
      .attr('x', 26)
      .attr('y', NODE_H / 2)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('font-size', '13px')
      .attr('fill', '#7a6a58')
      .text(d => d.data.name ? d.data.name.charAt(0) : '?');

    // Name
    nodeGroups.append('text')
      .attr('class', 'node-name')
      .attr('x', 52)
      .attr('y', NODE_H / 2 - 8)
      .attr('dominant-baseline', 'central')
      .text(d => truncate(d.data.name, 7));

    // Meta (birth year or occupation)
    nodeGroups.append('text')
      .attr('class', 'node-meta')
      .attr('x', 52)
      .attr('y', NODE_H / 2 + 12)
      .attr('dominant-baseline', 'central')
      .text(d => {
        if (d.data.date_of_birth) return formatYear(d.data.date_of_birth);
        if (d.data.occupation)    return truncate(d.data.occupation, 8);
        return '';
      });

    // Center the tree
    const bounds = gEl.node().getBBox();
    const tx = W / 2 - (bounds.x + bounds.width  / 2);
    const ty = 60     - bounds.y;
    svgEl.call(zoomBehavior.transform,
      d3.zoomIdentity.translate(tx, ty));
  }

  // ── Zoom controls ────────────────────────────────────────────
  function zoomIn()    { svgEl.transition().call(zoomBehavior.scaleBy, 1.3); }
  function zoomOut()   { svgEl.transition().call(zoomBehavior.scaleBy, 0.77); }
  function resetZoom() {
    const container = document.getElementById('tree-container');
    const W = container.clientWidth;
    const bounds = gEl.node().getBBox();
    const tx = W / 2 - (bounds.x + bounds.width / 2);
    svgEl.transition().call(zoomBehavior.transform,
      d3.zoomIdentity.translate(tx, 60));
  }

  // ── Detail panel ─────────────────────────────────────────────
  function showDetail(member) {
    document.getElementById('detail-panel').classList.add('open');

    // Avatar
    const avatarEl = document.getElementById('detail-avatar');
    if (member.avatar_url) {
      avatarEl.innerHTML = `<img src="${getAvatarUrl(member.avatar_url)}" alt="头像"/>`;
    } else {
      avatarEl.innerHTML = member.gender === 'female' ? '👩' : '👨';
    }

    document.getElementById('detail-name').textContent = member.name || '—';

    const genderMap = { male: '男', female: '女', other: '其他' };
    document.getElementById('detail-gender').textContent =
      genderMap[member.gender] || '';

    // Fields
    const fields = [
      { label: '出生日期', value: member.date_of_birth ? formatDate(member.date_of_birth) : null },
      { label: '逝世日期', value: member.date_of_death ? formatDate(member.date_of_death) : null },
      { label: '国籍',     value: member.nationality },
      { label: '籍贯',     value: member.hometown },
      { label: '职业',     value: member.occupation },
      { label: '简介',     value: member.bio },
    ];
    document.getElementById('detail-fields').innerHTML = fields
      .filter(f => f.value)
      .map(f => `
        <div class="detail-row">
          <span class="detail-row-label">${f.label}</span>
          <span class="detail-row-value">${f.value}</span>
        </div>`)
      .join('');

    // Related members
    const related = allRelationships
      .filter(r => r.member_a_id === member.id || r.member_b_id === member.id)
      .map(r => {
        const otherId = r.member_a_id === member.id ? r.member_b_id : r.member_a_id;
        const other   = allMembers.find(m => m.id === otherId);
        if (!other) return null;
        const typeMap = {
          parent_child: r.member_a_id === member.id ? '子女' : '父/母',
          spouse:       '配偶',
          sibling:      '兄弟姐妹',
        };
        return { name: other.name, type: typeMap[r.relationship_type] || r.relationship_type, member: other };
      })
      .filter(Boolean);

    if (related.length) {
      document.getElementById('detail-relations').innerHTML = `
        <div style="font-size:0.82rem;color:var(--ink-muted);margin-bottom:8px;">相关成员</div>
        ${related.map(r => `
          <span class="relation-chip" onclick="showDetail(${JSON.stringify(r.member).replace(/"/g, '&quot;')})">
            ${r.type}：${r.name}
          </span>`).join('')}`;
    } else {
      document.getElementById('detail-relations').innerHTML = '';
    }
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
  }

  // ── Helpers ──────────────────────────────────────────────────
  function truncate(str, n) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n) + '…' : str;
  }
  function formatYear(dateStr) {
    if (!dateStr) return '';
    return dateStr.slice(0, 4) + ' 年';
  }
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${y} 年 ${parseInt(m)} 月 ${parseInt(d)} 日`;
  }

  // Close detail panel when clicking outside
  document.getElementById('tree-svg').addEventListener('click', e => {
    if (e.target === document.getElementById('tree-svg')) closeDetail();
  });

  // Resize handler
  window.addEventListener('resize', () => { if (allMembers.length) renderTree(); });

  init();
</script>
</body>
</html>
