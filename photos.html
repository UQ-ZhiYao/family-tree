<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照片与上传 — 家族谱</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--parchment-3);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      text-align: center;
      background: var(--white);
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 28px;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--gold);
      background: var(--gold-pale);
    }
    .upload-zone-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .upload-zone h3   { font-size: 1rem; margin-bottom: 6px; }
    .upload-zone p    { font-size: 0.85rem; color: var(--ink-muted); }
    #photo-file-input { display: none; }

    /* ── Upload preview queue ── */
    .upload-queue {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .queue-item {
      position: relative;
      width: 90px; height: 90px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--parchment-3);
    }
    .queue-item img { width: 100%; height: 100%; object-fit: cover; }
    .queue-remove {
      position: absolute;
      top: 3px; right: 3px;
      width: 20px; height: 20px;
      background: rgba(26,18,8,0.7);
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .queue-item .progress-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
      width: 0%;
      transition: width 0.3s;
    }

    /* ── Gallery grid ── */
    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .gallery-item {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--parchment-2);
      aspect-ratio: 1;
      cursor: pointer;
      border: 1px solid var(--parchment-3);
      transition: var(--transition);
    }
    .gallery-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-mid); }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(26,18,8,0.75));
      padding: 24px 12px 12px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .gallery-item-caption {
      color: white;
      font-size: 0.82rem;
      line-height: 1.4;
    }
    .gallery-item-delete {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: rgba(139,26,26,0.85);
      color: white;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      font-size: 0.7rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .gallery-item:hover .gallery-item-delete { display: flex; }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,8,4,0.92);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius);
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 20px;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: var(--transition);
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.1); }
    .lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      text-align: center;
      max-width: 500px;
    }
    .lightbox-tags {
      margin-top: 6px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .lightbox-tag {
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
    }

    /* Caption input modal */
    .caption-modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 420px;
    }
    .caption-modal h3 { margin-bottom: 16px; }

    .empty-gallery {
      text-align: center;
      padding: 60px 24px;
      color: var(--ink-muted);
    }
    .empty-gallery-icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="brand-icon">🌳</div>
    家族谱
  </a>
  <div class="navbar-links">
    <span id="nav-guest"><a href="login.html" class="btn-login">登入</a></span>
    <span id="nav-user" class="navbar-user hidden">
      <a href="dashboard.html">家族图谱</a>
      <a href="photos.html">照片</a>
      <a href="admin.html" id="nav-admin-link" style="display:none;">管理员</a>
      <a href="profile.html">
        <img src="" alt="头像" class="navbar-avatar" id="nav-avatar" onerror="this.style.display='none'" />
      </a>
      <button class="btn btn-outline btn-sm" onclick="logout()">登出</button>
    </span>
  </div>
</nav>

<div class="app-layout">
  <aside class="sidebar">
    <span class="sidebar-label">导航</span>
    <div class="sidebar-section">
      <a href="dashboard.html" class="sidebar-link"><span class="icon">🗺️</span> 家族图谱</a>
      <a href="photos.html"    class="sidebar-link active"><span class="icon">📸</span> 照片与上传</a>
      <a href="profile.html"   class="sidebar-link"><span class="icon">👤</span> 个人设置</a>
    </div>
    <span class="sidebar-label" id="sidebar-admin-label" style="display:none;">管理员</span>
    <div class="sidebar-section" id="sidebar-admin-section" style="display:none;">
      <a href="admin.html" class="sidebar-link"><span class="icon">⚙️</span> 管理面板</a>
    </div>
    <span class="sidebar-label">账号</span>
    <div class="sidebar-section">
      <a class="sidebar-link" onclick="logout()" style="cursor:pointer;"><span class="icon">🚪</span> 登出</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>照片与上传</h1>
      <p>上传并管理家族珍贵照片</p>
    </div>

    <div class="alert" id="page-alert"></div>

    <!-- ── Upload zone ── -->
    <div class="upload-zone" id="upload-zone"
         onclick="document.getElementById('photo-file-input').click()"
         ondragover="handleDragOver(event)"
         ondragleave="handleDragLeave(event)"
         ondrop="handleDrop(event)">
      <div class="upload-zone-icon">📸</div>
      <h3>点击或拖拽上传照片</h3>
      <p>支持 JPG、PNG、WEBP 格式，单张最大 5MB</p>
    </div>
    <input type="file" id="photo-file-input" accept="image/*" multiple onchange="handleFilesSelected(this.files)" />

    <!-- ── Upload queue ── -->
    <div id="upload-queue" class="upload-queue"></div>
    <div id="upload-actions" class="hidden" style="margin-bottom:24px; display:flex; gap:10px; align-items:center;">
      <button class="btn btn-primary" onclick="uploadAll()" id="btn-upload-all">上传全部</button>
      <button class="btn btn-outline" onclick="clearQueue()">清空</button>
      <span style="font-size:0.83rem; color:var(--ink-muted);" id="upload-status"></span>
    </div>

    <!-- ── Gallery ── -->
    <div class="gallery-header">
      <h3 style="font-size:1rem;">家族相册</h3>
      <span style="font-size:0.82rem; color:var(--ink-muted);" id="photo-count"></span>
    </div>
    <div id="gallery-grid" class="gallery-grid"></div>
    <div id="gallery-empty" class="empty-gallery hidden">
      <div class="empty-gallery-icon">📷</div>
      <p>暂无照片，快上传第一张家族照片吧！</p>
    </div>

  </main>
</div>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  <div class="lightbox-caption">
    <div id="lightbox-caption-text"></div>
    <div class="lightbox-tags" id="lightbox-tags"></div>
  </div>
</div>

<!-- ── Caption modal ── -->
<div class="modal-overlay" id="caption-modal-overlay">
  <div class="caption-modal">
    <h3>添加说明</h3>
    <div class="form-group">
      <label class="form-label">照片说明（选填）</label>
      <input type="text" class="form-input" id="caption-input" placeholder="例：2024年春节家庭合影" />
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-primary" onclick="confirmUpload()">确认上传</button>
      <button class="btn btn-outline" onclick="closeCaptionModal()">取消</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
  let pendingFiles = [];
  let currentUser  = null;

  async function init() {
    await requireAuth();
    currentUser = await getCurrentUser();
    await initNavbar();

    const admin = await isAdmin();
    if (admin) {
      document.getElementById('sidebar-admin-label').style.display = 'block';
      document.getElementById('sidebar-admin-section').style.display = 'block';
    }
    await loadGallery();
  }

  // ── Drag & drop ──────────────────────────────────────────────
  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('upload-zone').classList.add('drag-over');
  }
  function handleDragLeave() {
    document.getElementById('upload-zone').classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-zone').classList.remove('drag-over');
    handleFilesSelected(e.dataTransfer.files);
  }

  // ── File selection ───────────────────────────────────────────
  function handleFilesSelected(files) {
    const valid = Array.from(files).filter(f => {
      if (!f.type.startsWith('image/')) return false;
      if (f.size > 5 * 1024 * 1024) {
        showAlert(`${f.name} 超过 5MB 限制`, 'error');
        return false;
      }
      return true;
    });
    pendingFiles = [...pendingFiles, ...valid];
    renderQueue();
  }

  function renderQueue() {
    const queueEl   = document.getElementById('upload-queue');
    const actionsEl = document.getElementById('upload-actions');
    queueEl.innerHTML = '';
    if (!pendingFiles.length) {
      actionsEl.classList.add('hidden');
      return;
    }
    actionsEl.classList.remove('hidden');

    pendingFiles.forEach((file, i) => {
      const url  = URL.createObjectURL(file);
      const item = document.createElement('div');
      item.className = 'queue-item';
      item.id = `queue-item-${i}`;
      item.innerHTML = `
        <img src="${url}" alt="" />
        <div class="queue-remove" onclick="removeFromQueue(${i})">✕</div>
        <div class="progress-bar" id="progress-${i}"></div>`;
      queueEl.appendChild(item);
    });
  }

  function removeFromQueue(i) {
    pendingFiles.splice(i, 1);
    renderQueue();
  }

  function clearQueue() {
    pendingFiles = [];
    renderQueue();
  }

  // ── Upload all ───────────────────────────────────────────────
  async function uploadAll() {
    if (!pendingFiles.length) return;

    const btn    = document.getElementById('btn-upload-all');
    const status = document.getElementById('upload-status');
    btn.disabled = true;
    btn.textContent = '上传中...';

    let successCount = 0;
    for (let i = 0; i < pendingFiles.length; i++) {
      const file = pendingFiles[i];
      status.textContent = `正在上传 ${i + 1} / ${pendingFiles.length}`;

      const ext  = file.name.split('.').pop();
      const path = `${currentUser.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

      // Update progress bar
      const progressEl = document.getElementById(`progress-${i}`);
      if (progressEl) progressEl.style.width = '50%';

      const { error: upErr } = await _supabase.storage
        .from('photos')
        .upload(path, file);

      if (upErr) {
        showAlert(`${file.name} 上传失败`, 'error');
        continue;
      }

      if (progressEl) progressEl.style.width = '80%';

      // Save to DB
      const { error: dbErr } = await _supabase.from('photos').insert({
        storage_path: path,
        caption:      '',
        uploaded_by:  currentUser.id,
      });

      if (!dbErr) {
        successCount++;
        if (progressEl) progressEl.style.width = '100%';
      }
    }

    btn.disabled = false;
    btn.textContent = '上传全部';

    if (successCount > 0) {
      showAlert(`成功上传 ${successCount} 张照片！`, 'success');
      pendingFiles = [];
      renderQueue();
      await loadGallery();
    }
  }

  // ── Load gallery ─────────────────────────────────────────────
  async function loadGallery() {
    const { data: photos } = await _supabase
      .from('photos')
      .select('*, profiles(full_name)')
      .order('created_at', { ascending: false });

    const grid  = document.getElementById('gallery-grid');
    const empty = document.getElementById('gallery-empty');
    const count = document.getElementById('photo-count');

    if (!photos || photos.length === 0) {
      grid.innerHTML  = '';
      empty.classList.remove('hidden');
      count.textContent = '';
      return;
    }

    empty.classList.add('hidden');
    count.textContent = `共 ${photos.length} 张`;

    const canDelete = await isAdmin();
    grid.innerHTML = photos.map(photo => {
      const url     = getPhotoUrl(photo.storage_path);
      const caption = photo.caption || '';
      const uploader = photo.profiles?.full_name || '家族成员';
      const isOwner  = photo.uploaded_by === currentUser.id;
      const showDel  = canDelete || isOwner;
      return `
        <div class="gallery-item" onclick="openLightbox('${url}', '${caption}', '${uploader}')">
          <img src="${url}" alt="${caption}" loading="lazy" />
          <div class="gallery-item-overlay">
            <div class="gallery-item-caption">${caption || uploader + ' 上传'}</div>
          </div>
          ${showDel ? `<div class="gallery-item-delete" onclick="deletePhoto(event,'${photo.id}','${photo.storage_path}')">🗑</div>` : ''}
        </div>`;
    }).join('');
  }

  // ── Delete photo ─────────────────────────────────────────────
  async function deletePhoto(e, photoId, storagePath) {
    e.stopPropagation();
    if (!confirm('确认删除这张照片？')) return;

    await _supabase.storage.from('photos').remove([storagePath]);
    await _supabase.from('photos').delete().eq('id', photoId);
    showAlert('照片已删除', 'success');
    loadGallery();
  }

  // ── Lightbox ─────────────────────────────────────────────────
  function openLightbox(url, caption, uploader) {
    document.getElementById('lightbox-img').src             = url;
    document.getElementById('lightbox-caption-text').textContent = caption || '';
    document.getElementById('lightbox-tags').innerHTML =
      uploader ? `<span class="lightbox-tag">📤 ${uploader}</span>` : '';
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') &&
             e.target !== document.querySelector('.lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }
  function closeCaptionModal() {
    document.getElementById('caption-modal-overlay').classList.remove('open');
  }

  // ── Alert ────────────────────────────────────────────────────
  function showAlert(msg, type = 'info') {
    const el = document.getElementById('page-alert');
    el.textContent = msg;
    el.className = `alert alert-${type} visible`;
    setTimeout(() => el.className = 'alert', 4000);
  }

  // Keyboard close lightbox
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
  });

  init();
</script>
</body>
</html>
